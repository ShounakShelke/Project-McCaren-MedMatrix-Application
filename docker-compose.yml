version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: claimmax_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: claimmax
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: claimmax_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claimmax_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/claimmax
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=claimmax_production_secret_key_change_me
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claimmax_celery
    command: celery -A backend.app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/claimmax
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db
    restart: always

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: claimmax_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
